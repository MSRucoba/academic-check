<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEMIC CHECK - DESCARGA TOTAL GAAAAA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Fondo de respaldo súper colorido y animado */
            background: linear-gradient(135deg, #1a0033, #001a33, #33001a, #000000);
            background-size: 400% 400%;
            animation: bgAurora 10s ease infinite;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        /* Canvas de fondo psicodélico */
        #psycho-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: contrast(2) saturate(3); /* Colores hiper saturados */
        }

        /* Capa de distorsión óptica extra */
        .overlay-vortex {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.6) 95%);
            pointer-events: none;
        }

        /* Contenedor Principal */
        .main-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
            width: 90%;
            max-width: 650px;
            padding: 50px;
            background: rgba(10, 0, 20, 0.7);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 4px solid #ff007f;
            box-shadow: 0 0 40px #ff007f, inset 0 0 30px #00ffff, 0 0 100px rgba(255,0,127,0.5);
            animation: containerFloat 4s ease-in-out infinite alternate, borderPulse 3s linear infinite;
        }

        /* Efecto Glitch Brutal para el Título */
        .glitch-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            color: #00ffff;
            text-shadow: 4px 4px 0px #ff007f, -4px -4px 0px #00ff00;
            letter-spacing: 5px;
            margin-bottom: 15px;
            animation: glitch 1s linear infinite;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
            animation: pulseText 1s ease-in-out infinite alternate;
        }

        /* El Botón Épico y Extravagante */
        .download-btn {
            display: inline-block;
            position: relative;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ff007f, #7f00ff, #00ffff, #00ff00, #ff007f);
            background-size: 400% 400%;
            border: 5px solid #fff;
            border-radius: 60px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 30px #ff007f, 0 0 60px #00ffff;
            transition: all 0.2s ease;
            animation: gradientMove 2s linear infinite, btnWobble 1.5s ease-in-out infinite alternate;
        }

        .download-btn:hover {
            transform: scale(1.15) rotate(3deg);
            box-shadow: 0 0 60px #ff00ea, 0 0 120px #00ffd5;
            letter-spacing: 8px;
            border-color: #00ffff;
        }

        .download-btn:active {
            transform: scale(0.9) rotate(-3deg);
        }

        /* Mensajes de la Beba Army */
        .army-footer {
            margin-top: 40px;
            font-size: 1.1rem;
            color: #ff007f;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff00ea;
            animation: crazySway 0.5s linear infinite alternate;
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes bgAurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes borderPulse {
            0% { border-color: #ff007f; box-shadow: 0 0 40px #ff007f, inset 0 0 30px #00ffff; }
            50% { border-color: #00ffff; box-shadow: 0 0 40px #00ffff, inset 0 0 30px #ff007f; }
            100% { border-color: #ff007f; box-shadow: 0 0 40px #ff007f, inset 0 0 30px #00ffff; }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes containerFloat {
            0% { transform: translate(-50%, -46%) scale(0.98); }
            100% { transform: translate(-50%, -54%) scale(1.02); }
        }

        @keyframes pulseText {
            0% { opacity: 0.6; text-shadow: 0 0 10px #00ff00; }
            100% { opacity: 1; text-shadow: 0 0 30px #00ff00, 0 0 50px #00ffff; }
        }

        @keyframes btnWobble {
            0% { transform: rotate(-2deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.05); }
        }

        @keyframes crazySway {
            0% { transform: skewX(-15deg) scale(0.95); color: #ff007f; }
            100% { transform: skewX(15deg) scale(1.05); color: #00ffff; }
        }

        @keyframes glitch {
            0% { text-shadow: 4px 4px 0px #ff007f, -4px -4px 0px #00ff00; }
            15% { text-shadow: -4px 3px 0px #ff007f, 4px -3px 0px #00ffff; }
            30% { text-shadow: 5px -4px 0px #00ff00, -5px 4px 0px #ff007f; }
            45% { text-shadow: -3px -3px 0px #00ffff, 3px 3px 0px #00ff00; }
            60% { text-shadow: 4px 4px 0px #ff007f, -4px -4px 0px #00ff00; }
            100% { text-shadow: -4px 3px 0px #ff007f, 4px -3px 0px #00ffff; }
        }
    </style>
</head>
<body>

    <canvas id="psycho-canvas"></canvas>
    <div class="overlay-vortex"></div>

    <div class="main-container">
        <h1 class="glitch-title">ACADEMIC CHECK</h1>
        <p class="subtitle">¡BAJATE EL APK MAS EXCLUSIVO!</p>
        
        <a href="https://github.com/MSRucoba/academic-check/releases/latest/download/app-release.apk" class="download-btn" id="dl-button">
            DESCARGAR APK
        </a>

        <div class="army-footer">
            MAKANAKI GAAAAA - BEBA ARMY UNIDA <br> 🚀 EFECTOS ULTRA PSICODÉLICOS ACTIVADOS 🚀
        </div>
    </div>

    <script>
        const canvas = document.getElementById('psycho-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let particles = [];
        const numParticles = 100;

        class PsychoParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 8 + 3; // Partículas más grandes
                this.colorValue = Math.random() * 360;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += Math.sin(this.angle) * this.speedX * 2;
                this.y += Math.cos(this.angle) * this.speedY * 2;
                this.angle += this.spinSpeed;
                this.colorValue = (this.colorValue + 5) % 360; // Cambian de color más rápido

                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * (1 + Math.sin(this.angle) * 0.8), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.colorValue}, 100%, 50%, 0.9)`;
                ctx.shadowBlur = 25;
                ctx.shadowColor = `hsl(${this.colorValue}, 100%, 50%)`;
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new PsychoParticle());
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        let hueOffset = 0;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            hueOffset = (hueOffset + 2) % 360;

            // Túnel de fondo súper colorido
            ctx.strokeStyle = `hsla(${hueOffset}, 100%, 50%, 0.3)`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            for (let i = 0; i < width; i += 50) {
                ctx.moveTo(i, 0);
                ctx.lineTo(width - i, height);
                ctx.moveTo(0, i * (height/width));
                ctx.lineTo(width, height - i * (height/width));
            }
            ctx.stroke();

            particles.forEach(p => {
                p.update();
                
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - p.x;
                    let dy = mouse.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 300) {
                        p.x -= (dx / dist) * 6;
                        p.y -= (dy / dist) * 6;
                    }
                }
                
                p.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(${(particles[i].colorValue + particles[j].colorValue)/2}, 100%, 50%, ${1 - dist/150})`;
                        ctx.lineWidth = 2.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        const btn = document.getElementById('dl-button');
        btn.addEventListener('click', () => {
            particles.forEach(p => {
                p.speedX *= 5;
                p.speedY *= 5;
                p.radius *= 2;
            });
        });
    </script>
</body>
</html>
