        /* --- ANIMACIONES CSS --- */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }

        }

        @keyframes containerFloat {
            0% { transform: translate(-50%, -46%) scale(0.98); }

        }

        @keyframes glitch {
            0% { text-shadow: 3px 3px 0px #ff007f, -3px -3px 0px #00ff00; }
            15% { text-shadow: -3px 2px 0px #ff007f, 3px -2px 0px #00ffff; }
